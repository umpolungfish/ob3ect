name = "ob3ect-proofs"
version = "0.1.0"
keywords = ["category-theory", "imscribing-grammar", "ob3ect"]

[leanOptions]
pp.unicode.fun = true
relaxedAutoImplicit = false

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.28.0"

[[lean_lib]]
name = "ob3ect_proofs"
root = "proofs"
globs = [
  "Frobenius",
  "Hopf",
  "Monad",
  "Topos",
  "CCC",
  "HoTT",
  "LinearLogic",
  "Quantum",
  "StringDiagrams",
  "SelfImscription",
  "Coherence",
  "TowerCoherence",
  "GrandCoherence"
]
